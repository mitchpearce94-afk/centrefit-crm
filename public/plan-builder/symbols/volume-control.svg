<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="#1a0033" stroke="#9933ff" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#6600cc" stroke-width="1.5" opacity="0.6"/>
  <!-- Dial indicator marks -->
  <line x1="32" y1="52" x2="32" y2="48" stroke="#9933ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="14" y1="42" x2="17.5" y2="39.5" stroke="#9933ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="50" y1="42" x2="46.5" y2="39.5" stroke="#9933ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="12" y1="27" x2="16" y2="28.5" stroke="#9933ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="52" y1="27" x2="48" y2="28.5" stroke="#9933ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Center knob -->
  <circle cx="32" cy="32" r="8" fill="#6600cc" stroke="#cc66ff" stroke-width="1.5"/>
  <!-- Pointer -->
